# B'hive Coordination Infrastructure
#
# This Docker Compose stack provides the shared infrastructure for all bhive projects.
# It includes:
# - PostgreSQL: Task coordination and bee lifecycle management
# - Future services: Qdrant (vector DB), Redis (caching), etc.
#
# Usage:
#   docker-compose up -d              # Start services
#   docker-compose down               # Stop services
#   docker-compose logs -f postgres   # View logs
#   docker-compose ps                 # Check status

version: '3.8'

name: bhive

services:
  postgres:
    image: postgres:16-alpine
    container_name: bhive-postgres
    restart: unless-stopped

    environment:
      # Main database credentials
      POSTGRES_USER: ${POSTGRES_USER:-bhive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bhive_dev}
      POSTGRES_DB: postgres  # Default database

      # Enable multiple database support
      POSTGRES_MULTIPLE_DATABASES: "true"

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      # Persistent data storage (centralized location)
      - ${BHIVE_DATA_DIR:-~/.config/bhive/data/postgres}:/var/lib/postgresql/data

      # Initialization scripts (run on first start)
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro

      # Schema migrations (mounted for easy access)
      - ./migrations:/migrations:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bhive} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - bhive

  # B'hive API Server
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: bhive-api
    restart: unless-stopped

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bhive}:${POSTGRES_PASSWORD:-bhive_dev}@postgres:5432/postgres
      RUST_LOG: ${RUST_LOG:-bhive_api=debug,tower_http=debug}

    ports:
      - "${API_PORT:-3030}:3030"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - bhive

  # Future services can be added here:
  #
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: bhive-qdrant
  #   restart: unless-stopped
  #   ports:
  #     - "${QDRANT_PORT:-6333}:6333"
  #   volumes:
  #     - ${BHIVE_DATA_DIR:-~/.config/bhive/data/qdrant}:/qdrant/storage
  #   networks:
  #     - bhive
  #
  # redis:
  #   image: redis:7-alpine
  #   container_name: bhive-redis
  #   restart: unless-stopped
  #   ports:
  #     - "${REDIS_PORT:-6379}:6379"
  #   volumes:
  #     - ${BHIVE_DATA_DIR:-~/.config/bhive/data/redis}:/data
  #   networks:
  #     - bhive

networks:
  bhive:
    name: bhive
    driver: bridge

# Volume definitions (optional - using bind mounts for easier access)
# volumes:
#   postgres-data:
#   qdrant-data:
#   redis-data:
